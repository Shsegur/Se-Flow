<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Se-Flow</title>
    <link rel="icon" type="image/png" href="./se.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      window.addEventListener('error', function (e) {
        var box = document.createElement('pre');
        box.style.cssText = 'position:fixed;inset:12px;z-index:99999;background:#111827;color:#f9fafb;padding:16px;border-radius:12px;overflow:auto;white-space:pre-wrap;font:12px/1.4 monospace;';
        box.textContent = 'Se-Flow runtime error:\n' + (e.message || 'unknown error');
        document.body.appendChild(box);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
